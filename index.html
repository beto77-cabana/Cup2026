<style>
/* ═══════════════════════════════════════════════════
   ESTILOS CSS - ESTÉTICA FUTURISTA / ESPACIAL
   ═══════════════════════════════════════════════════ */
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Rajdhani',sans-serif; color:#fff; }
canvas { display:block; }

/* LOADING SCREEN */
#loading-screen {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:radial-gradient(ellipse at center, #0a0a2e 0%, #000 70%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:9999; transition:opacity 1.5s;
}
#loading-screen.hidden { opacity:0; pointer-events:none; }
#loading-screen h1 {
  font-family:'Orbitron',sans-serif; font-size:2.5rem; color:#ffd700;
  text-shadow:0 0 30px #ffd700,0 0 60px #ff8c00;
  margin-bottom:10px; letter-spacing:4px;
}
#loading-screen h2 {
  font-family:'Orbitron',sans-serif; font-size:1.2rem; color:#aaa;
  margin-bottom:40px; letter-spacing:2px;
}
#loading-bar-container {
  width:60%; max-width:500px; height:6px; background:#1a1a3e;
  border-radius:3px; overflow:hidden; margin-bottom:20px;
}
#loading-bar {
  width:0%; height:100%; background:linear-gradient(90deg,#ffd700,#ff8c00,#ffd700);
  border-radius:3px; transition:width 0.3s;
}
#loading-text { font-size:1rem; color:#888; min-height:24px; }

/* UI OVERLAY */
#ui-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:100;
}
#ui-overlay > * { pointer-events:auto; }

/* TOP BAR */
#top-bar {
  position:absolute; top:0; left:0; width:100%; padding:10px 20px;
  display:flex; justify-content:space-between; align-items:center;
  background:linear-gradient(180deg,rgba(0,0,0,0.8) 0%,transparent 100%);
}
#title-3d {
  font-family:'Orbitron',sans-serif; font-size:1.1rem; color:#ffd700;
  text-shadow:0 0 10px #ffd700;
}
#data-badge {
  font-size:0.75rem; color:#888; background:rgba(255,255,255,0.05);
  padding:4px 10px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);
}
#status-badge {
  font-family:'Orbitron',sans-serif; font-size:0.65rem; color:#0f0;
  background:rgba(0,255,0,0.1); padding:4px 10px; border-radius:12px;
  border:1px solid rgba(0,255,0,0.3); animation:pulse-green 2s infinite;
}
@keyframes pulse-green {
  0%,100%{box-shadow:0 0 5px rgba(0,255,0,0.3)}50%{box-shadow:0 0 15px rgba(0,255,0,0.5)}
}

/* LEFT CONTROLS */
#controls {
  position:absolute; top:80px; left:15px; display:flex; flex-direction:column; gap:6px;
}
.ctrl-btn {
  background:rgba(20,20,50,0.85); border:1px solid rgba(255,215,0,0.3);
  color:#ffd700; font-family:'Rajdhani',sans-serif; font-size:0.8rem;
  padding:6px 12px; border-radius:6px; cursor:pointer; transition:all 0.2s;
  text-align:left;
}
.ctrl-btn:hover { background:rgba(255,215,0,0.2); border-color:#ffd700; }
.ctrl-btn.active { background:rgba(255,215,0,0.3); border-color:#ffd700; }
#btn-vista-general { margin-bottom:8px; font-weight:700; }

/* BUSCADOR */
#search-container {
  position:relative; width:100%; margin-bottom:6px;
}
#search-input {
  width:100%; padding:6px 10px; border-radius:6px;
  background:rgba(20,20,50,0.9); border:1px solid rgba(255,215,0,0.3);
  color:#ffd700; font-family:'Rajdhani',sans-serif; font-size:0.8rem;
  outline:none; transition:border-color 0.2s;
}
#search-input::placeholder { color:rgba(255,215,0,0.4); }
#search-input:focus { border-color:#ffd700; box-shadow:0 0 8px rgba(255,215,0,0.2); }
#autocomplete-list {
  position:absolute; top:100%; left:0; right:0;
  background:rgba(10,10,30,0.95); border:1px solid rgba(255,215,0,0.3);
  border-top:none; border-radius:0 0 6px 6px; max-height:200px;
  overflow-y:auto; z-index:200; display:none;
}
.autocomplete-item {
  padding:6px 10px; cursor:pointer; font-size:0.8rem;
  color:#fff; display:flex; align-items:center; gap:8px;
  transition:background 0.15s;
}
.autocomplete-item:hover, .autocomplete-item.active {
  background:rgba(255,215,0,0.2); color:#ffd700;
}
.autocomplete-item img { width:24px; height:16px; border-radius:2px; }
.autocomplete-item .ac-group {
  font-size:0.65rem; color:#888; margin-left:auto;
}

/* LEGEND */
#legend {
  position:absolute; bottom:15px; left:15px;
  background:rgba(10,10,30,0.85); border:1px solid rgba(255,255,255,0.1);
  border-radius:8px; padding:10px 14px; font-size:0.7rem;
}
#legend div { margin:3px 0; }

/* HOVER PANEL */
#hover-panel {
  position:absolute; display:none;
  background:rgba(10,10,40,0.95); border:1px solid rgba(255,215,0,0.4);
  border-radius:10px; padding:14px 18px; min-width:280px; max-width:360px;
  box-shadow:0 0 30px rgba(255,215,0,0.15);
  font-size:0.8rem; line-height:1.5;
  backdrop-filter:blur(10px);
}
#hover-panel .hp-header {
  display:flex; align-items:center; gap:10px; margin-bottom:8px;
  border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:8px;
}
#hover-panel .hp-header img { width:32px; height:21px; border-radius:2px; }
#hover-panel .hp-header .hp-country {
  font-family:'Orbitron',sans-serif; font-size:0.9rem; color:#ffd700;
}
#hover-panel .hp-header .hp-group { font-size:0.7rem; color:#888; }
#hover-panel .hp-stats { margin:8px 0; }
#hover-panel .hp-stats table { width:100%; border-collapse:collapse; }
#hover-panel .hp-stats td { padding:2px 6px; font-size:0.75rem; }
#hover-panel .hp-stats .stat-label { color:#888; }
#hover-panel .hp-stats .stat-value { color:#fff; font-weight:600; text-align:right; }
#hover-panel .hp-matches { margin-top:8px; border-top:1px solid rgba(255,255,255,0.1); padding-top:8px; }
#hover-panel .hp-match {
  display:flex; align-items:center; gap:6px; padding:3px 0;
  font-size:0.72rem;
}
#hover-panel .hp-match .result-v { color:#4caf50; font-weight:700; }
#hover-panel .hp-match .result-e { color:#ffc107; font-weight:700; }
#hover-panel .hp-match .result-d { color:#f44336; font-weight:700; }
#hover-panel .hp-match .match-detail { color:#aaa; font-size:0.65rem; }
#hover-panel .hp-pending { color:#888; font-style:italic; padding:6px 0; }

/* ═══════════════════════════════════════════════════

   ═══════════════════════════════════════════════════ */

/* Tablet (768px y menos) */
@media (max-width: 768px) {
  #loading-screen h1 { font-size:1.6rem; letter-spacing:2px; }

  #loading-bar-container { width:80%; }

  #top-bar {
    flex-direction:column; gap:8px; padding:8px 10px;

  #title-3d { font-size:0.85rem; text-align:center; }
  #status-badge { font-size:0.55rem; }
  #data-badge { font-size:0.6rem; }

  #search-input { font-size:0.7rem; padding:5px 8px; }
  #autocomplete-list { max-height:150px; }
  .autocomplete-item { font-size:0.7rem; padding:5px 8px; }
  .autocomplete-item img { width:20px; height:13px; }

  #controls {
    top:auto; bottom:10px; left:10px; right:10px;
    flex-direction:row; flex-wrap:wrap; gap:4px;
    justify-content:center;
    background:rgba(0,0,0,0.7); border-radius:8px;
    padding:6px;
  }
  #btn-vista-general { margin-bottom:0; font-size:0.7rem; padding:5px 10px; }
  #controls .ctrl-btn { font-size:0.65rem; padding:4px 8px; }
  #group-btns { display:flex; flex-wrap:wrap; gap:3px; justify-content:center; }
  #group-btns .ctrl-btn { padding:4px 7px; font-size:0.7rem; min-width:28px; text-align:center; }

  #legend {
    display:none;
  }

  #hover-panel {
    min-width:auto; max-width:calc(100vw - 20px);
    font-size:0.7rem; padding:10px 12px;
    left:10px !important; right:10px;
    top:auto !important; bottom:80px !important;
  }
  #hover-panel .hp-header .hp-country { font-size:0.8rem; }
  #hover-panel .hp-stats td { font-size:0.65rem; padding:1px 4px; }
  #hover-panel .hp-match { font-size:0.65rem; }
  #hover-panel .hp-match .match-detail { font-size:0.55rem; }
}

  #status-badge { font-size:0.5rem; padding:3px 6px; }

  #controls { bottom:8px; left:5px; right:5px; padding:4px; gap:3px; }
  #btn-vista-general { font-size:0.6rem; padding:4px 8px; }
  #controls .ctrl-btn { font-size:0.6rem; padding:3px 6px; }
  #group-btns .ctrl-btn { min-width:24px; font-size:0.6rem; padding:3px 5px; }

  #hover-panel {
    padding:8px 10px; bottom:70px !important;
    max-height:50vh; overflow-y:auto;
  }
  #hover-panel .hp-header img { width:24px; height:16px; }
  #hover-panel .hp-header .hp-country { font-size:0.7rem; }
}

/* Orientación landscape en móvil */
@media (max-height: 500px) and (orientation: landscape) {
  #controls {
    top:5px; bottom:auto; left:5px; right:5px;
    flex-direction:row; flex-wrap:nowrap;
    overflow-x:auto;
  }
  #hover-panel { max-height:70vh; bottom:50px !important; }
}

// Inline OrbitControls (minimal)
function setupOrbitControls() {
  let isDragging = false;
  let prevMouse = { x: 0, y: 0 };
  let spherical = { theta: 0, phi: Math.PI / 3, radius: window.innerWidth <= 768 ? 50 : 30 };
  let target = new THREE.Vector3(0, 0, 0);
  
  function updateCamera() {
    camera.position.x = target.x + spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
    camera.position.y = target.y + spherical.radius * Math.cos(spherical.phi);
    camera.position.z = target.z + spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
    camera.lookAt(target);
  }
  
  renderer.domElement.addEventListener('mousedown', (e) => {
    if (e.button === 0) { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; }
  });
  renderer.domElement.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    spherical.theta -= dx * 0.005;
    spherical.phi = Math.max(0.2, Math.min(Math.PI - 0.2, spherical.phi - dy * 0.005));
    prevMouse = { x: e.clientX, y: e.clientY };
    updateCamera();
  });
  renderer.domElement.addEventListener('mouseup', () => { isDragging = false; });
  renderer.domElement.addEventListener('mouseleave', () => { isDragging = false; });
  renderer.domElement.addEventListener('wheel', (e) => {
    spherical.radius = Math.max(10, Math.min(60, spherical.radius + e.deltaY * 0.03));
    updateCamera();
  });
  
  // Touch support
  renderer.domElement.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true;
      prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
  });
  renderer.domElement.addEventListener('touchmove', (e) => {
    if (!isDragging || e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - prevMouse.x;
    const dy = e.touches[0].clientY - prevMouse.y;
    spherical.theta -= dx * 0.005;
    spherical.phi = Math.max(0.2, Math.min(Math.PI - 0.2, spherical.phi - dy * 0.005));
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    updateCamera();
  });
  renderer.domElement.addEventListener('touchend', () => { isDragging = false; });
  
  updateCamera();
  
  // Expose for camera animation
  window._orbitControls = { spherical, target, updateCamera };
}

function createStarField() {
  const geo = new THREE.BufferGeometry();
  const count = 2000;
  const positions = new Float32Array(count * 3);
  for (let i = 0; i < count * 3; i += 3) {
    positions[i] = (Math.random() - 0.5) * 200;
    positions[i+1] = (Math.random() - 0.5) * 200;
    positions[i+2] = (Math.random() - 0.5) * 200;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.8 });
  starField = new THREE.Points(geo, mat);
  scene.add(starField);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// Grid layout: 4 cols x 3 rows
const GRID_COLS = 4;
const GRID_ROWS = 3;
const CARD_W = 5.5;
const CARD_H = 4.0;
const CARD_GAP_X = 6.5;
const CARD_GAP_Y = 7.2;

function getGroupPosition(index) {
  const col = index % GRID_COLS;
  const row = Math.floor(index / GRID_COLS);
  const x = (col - (GRID_COLS - 1) / 2) * CARD_GAP_X;
  const y = ((GRID_ROWS - 1) / 2 - row) * CARD_GAP_Y;
  return new THREE.Vector3(x, y, 0);
}

function createTextSprite(text, fontSize, color, bgColor) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 512;
  canvas.height = 128;
  
  if (bgColor) {
    ctx.fillStyle = bgColor;
    ctx.beginPath();
    ctx.roundRect(0, 0, 512, 128, 12);
    ctx.fill();
  }
  
  ctx.font = `bold ${fontSize}px Orbitron, sans-serif`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 256, 64);
  
  const tex = new THREE.CanvasTexture(canvas);
  tex.needsUpdate = true;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(3, 0.75, 1);
  return sprite;
}

function createCardMesh(groupKey, groupData) {
  const container = new THREE.Group();
  const pos = getGroupPosition(GROUP_LETTERS.indexOf(groupKey));
  container.position.copy(pos);
  
  // Card background (glass effect)
  const cardGeo = new THREE.PlaneGeometry(CARD_W, CARD_H);
  const cardMat = new THREE.MeshPhysicalMaterial({
    color: 0x0a0a2e,
    transparent: true,
    opacity: 0.75,
    roughness: 0.1,
    metalness: 0.3,
    side: THREE.DoubleSide
  });
  const cardMesh = new THREE.Mesh(cardGeo, cardMat);
  cardMesh.userData = { type: 'card', group: groupKey };
  container.add(cardMesh);
  
  // Border glow
  const borderGeo = new THREE.EdgesGeometry(cardGeo);
  const borderMat = new THREE.LineBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.4 });
  const borderMesh = new THREE.LineSegments(borderGeo, borderMat);
  container.add(borderMesh);
  
  // Group title
  const titleSprite = createTextSprite(`${groupKey}`, 48, '#ffd700');
  titleSprite.position.set(0, CARD_H / 2 - 0.5, 0.1);
  titleSprite.scale.set(7.0, 1.6, 1);
  container.add(titleSprite);
  
  // Jornada badge
  const jornadaText = `Jornada ${groupData.jornadaActual}/${groupData.totalJornadas}`;
  const jornadaSprite = createTextSprite(jornadaText, 32, '#88aacc');
  jornadaSprite.position.set(0, CARD_H / 2 - 1.0, 0.1);
  jornadaSprite.scale.set(2, 0.4, 1);
  container.add(jornadaSprite);
  
  // Flags (2x2 grid)
  const flagMeshes = [];
  const flagSize = 1.2;
  const flagGap = 1.5;
  const startX = -flagGap / 2;
  const startY = 0.4;
  
  groupData.equipos.forEach((eq, idx) => {
    const col = idx % 2;
    const row = Math.floor(idx / 2);
    const fx = startX + col * flagGap;
    const fy = startY - row * 1.6;
    
    const flagGeo = new THREE.PlaneGeometry(flagSize, flagSize * 0.67);
    
    // Load flag texture
    const loader = new THREE.TextureLoader();
    const flagUrl = getFlagUrl(eq.iso2);
    const flagMat = new THREE.MeshBasicMaterial({ 
      color: 0x333355, 
      side: THREE.DoubleSide,
      transparent: true 
    });
    
    const flagMesh = new THREE.Mesh(flagGeo, flagMat);
    flagMesh.position.set(fx, fy, 0.15);
    flagMesh.userData = { 
      type: 'flag', 
      group: groupKey, 
      teamIndex: idx, 
      country: eq.pais, 
      iso2: eq.iso2,
      stats: eq.stats,
      partidos: eq.partidos
    };
    
    // Load texture asynchronously
    loader.load(flagUrl, 
      (tex) => {
        flagMesh.material.map = tex;
        flagMesh.material.color.set(0xffffff);
        flagMesh.material.needsUpdate = true;
      },
      undefined,
      () => {
        // Fallback: colored rectangle
        flagMesh.material.color.set(getFallbackColor(eq.iso2));
      }
    );
    
    container.add(flagMesh);
    flagMeshes.push(flagMesh);
    
    // Country name below flag
    const nameSprite = createTextSprite(eq.pais, 28, '#cccccc');
    nameSprite.position.set(fx, fy - 0.6, 0.15);
    nameSprite.scale.set(1.4, 0.3, 1);
    container.add(nameSprite);
    
    // Points badge
    const ptsText = `${eq.stats.pts} pts`;
    const ptsColor = eq.stats.pts >= 6 ? '#4caf50' : eq.stats.pts >= 3 ? '#ffc107' : '#f44336';
    const ptsSprite = createTextSprite(ptsText, 24, ptsColor);
    ptsSprite.position.set(fx, fy - 0.9, 0.15);
    ptsSprite.scale.set(1.0, 0.25, 1);
    container.add(ptsSprite);
  });
  
  scene.add(container);
  
  groupMeshes[groupKey] = {
    container,
    cardMesh,
    borderMesh,
    flagMeshes,
    titleSprite,
    groupData
  };
  
  return container;
}

    ca:0xff0000, ba:0x002f6c, qa:0x8d1b3d, ch:0xff0000,

    pjCtx.textAlign = 'center';
    pjCtx.textBaseline = 'middle';
    pjCtx.fillStyle = '#ffffff';
    pjCtx.fillText(`PJ: ${leaderEq.stats.pj}`, 128, 128);
    const pjTex = new THREE.CanvasTexture(pjCanvas);
    pjTex.needsUpdate = true;
    const pjInfoSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: pjTex, transparent: true }));
    pjInfoSprite.position.set(1.8, -0.5, 0.1);
    pjInfoSprite.scale.set(3.6, 1.8, 1);
    leaderGroup.add(pjInfoSprite);
    
    // Leader flag also interactive
    leaderFlag.userData = {
      type: 'flag',
      group: groupKey,
      teamIndex: groupData.equipos.indexOf(leaderEq),
      country: leaderEq.pais,
      iso2: leaderEq.iso2,
      stats: leaderEq.stats,
      partidos: leaderEq.partidos,
      isLeader: true
    };
    
    group.leaderMesh = leaderFlag;
    group.glowMesh = glowMesh;
    
    container.add(leaderGroup);
    group.leaderGroup = leaderGroup;
    
  } else if (lider.tipo === 'empate') {
    // Silver/blue glow for tied teams
    const tiedEquipos = lider.equipos.map(name => groupData.equipos.find(e => e.pais === name)).filter(Boolean);
    const tieGroup = new THREE.Group();
    tieGroup.position.set(0, CARD_H / 2 + 1.0, 0.3);
    
    tiedEquipos.forEach((eq, idx) => {
      const offsetX = (idx - (tiedEquipos.length - 1) / 2) * 1.6;
      
      const flagGeo = new THREE.PlaneGeometry(1.3, 0.87);
      const loader = new THREE.TextureLoader();
      const flagMat = new THREE.MeshBasicMaterial({ color: 0x333355, side: THREE.DoubleSide, transparent: true });
      const flagMesh = new THREE.Mesh(flagGeo, flagMat);
      flagMesh.position.set(offsetX, 0, 0);
      
      loader.load(getFlagUrl(eq.iso2),
        (tex) => { flagMesh.material.map = tex; flagMesh.material.color.set(0xffffff); flagMesh.material.needsUpdate = true; },
        undefined,
        () => { flagMesh.material.color.set(getFallbackColor(eq.iso2)); }
      );
      
      flagMesh.userData = {
        type: 'flag', group: groupKey,
        teamIndex: groupData.equipos.indexOf(eq),
        country: eq.pais, iso2: eq.iso2,
        stats: eq.stats, partidos: eq.partidos,
        isLeader: true
      };
      
      tieGroup.add(flagMesh);
      
      // Blue glow
      const glowGeo = new THREE.PlaneGeometry(1.8, 1.3);
      const glowMat = new THREE.MeshBasicMaterial({
        color: 0x64b5f6, transparent: true, opacity: 0.12,
        side: THREE.DoubleSide, blending: THREE.AdditiveBlending
      });
      const glowMesh = new THREE.Mesh(glowGeo, glowMat);
      glowMesh.position.set(offsetX, 0, -0.1);
      tieGroup.add(glowMesh);
    });
    
    // "EMPATE" badge
    const badgeSprite = createTextSprite('⚖️ EMPATE', 26, '#64b5f6', 'rgba(0,0,0,0.6)');
    badgeSprite.position.set(0, -0.8, 0.1);
    badgeSprite.scale.set(1.4, 0.3, 1);
    tieGroup.add(badgeSprite);
    
    container.add(tieGroup);
    group.leaderGroup = tieGroup;
    group.glowMeshes = tieGroup.children.filter(c => c.material && c.material.blending === THREE.AdditiveBlending);
  }
}

// ═══════════════════════════════════════════════════════════
// SECCIÓN 6: INTERACTIVIDAD Y RAYCASTING
// ═══════════════════════════════════════════════════════════

function onMouseMove(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  
  // Collect all flag meshes
  const allFlags = [];
  Object.values(groupMeshes).forEach(g => {
    g.flagMeshes.forEach(f => allFlags.push(f));
    if (g.leaderMesh) allFlags.push(g.leaderMesh);
    if (g.leaderGroup) {
      g.leaderGroup.children.forEach(c => {
        if (c.userData && c.userData.type === 'flag') allFlags.push(c);
      });
    }
  });
  
  const intersects = raycaster.intersectObjects(allFlags);
  
  if (intersects.length > 0) {
    const flag = intersects[0].object;
    if (hoveredFlag !== flag) {
      // Unhover previous
      if (hoveredFlag) unhoverFlag(hoveredFlag);
      hoveredFlag = flag;
      hoverFlag(flag, event.clientX, event.clientY);
    } else {
      // Update panel position
      updatePanelPosition(event.clientX, event.clientY);
    }
    renderer.domElement.style.cursor = 'pointer';
  } else {
    if (hoveredFlag) {
      unhoverFlag(hoveredFlag);
      hoveredFlag = null;
      hidePanel();
    }
    renderer.domElement.style.cursor = 'grab';
  }
}

function hoverFlag(mesh, mx, my) {
  // Scale up with simple lerp (we'll animate in the loop)
  mesh.userData._hoverScale = 1.2;
  showPanel(mesh.userData, mx, my);
}

function unhoverFlag(mesh) {
  mesh.userData._hoverScale = 1.0;
}

function showPanel(data, mx, my) {
  const panel = document.getElementById('hover-panel');
  const flag = document.getElementById('hp-flag');
  const country = document.getElementById('hp-country');
  const group = document.getElementById('hp-group');
  const stats = document.getElementById('hp-stats');
  const matches = document.getElementById('hp-matches');
  
  const flagUrl = getFlagUrl(data.iso2);
  flag.src = flagUrl;
  flag.onerror = () => { flag.style.display = 'none'; };
  flag.onload = () => { flag.style.display = 'inline'; };
  
  country.textContent = data.country;
  group.textContent = `Grupo ${data.group} — Posición: #${data.stats.pos}`;
  
  // Stats table
  const s = data.stats;
  stats.innerHTML = `
    <table>
      <tr><td class="stat-label">Partidos Jugados:</td><td class="stat-value">${s.pj}</td></tr>
      <tr><td class="stat-label">Ganados:</td><td class="stat-value" style="color:#4caf50">${s.g}</td></tr>
      <tr><td class="stat-label">Empatados:</td><td class="stat-value" style="color:#ffc107">${s.e}</td></tr>
      <tr><td class="stat-label">Perdidos:</td><td class="stat-value" style="color:#f44336">${s.p}</td></tr>
      <tr><td class="stat-label">Goles a Favor:</td><td class="stat-value">${s.gf}</td></tr>
      <tr><td class="stat-label">Goles en Contra:</td><td class="stat-value">${s.gc}</td></tr>
      <tr><td class="stat-label">Diferencia:</td><td class="stat-value">${s.dg}</td></tr>
      <tr><td class="stat-label" style="color:#ffd700">Puntos:</td><td class="stat-value" style="color:#ffd700;font-size:1rem">${s.pts}</td></tr>
    </table>`;
  
  // Matches
  let matchHtml = '';
  data.partidos.forEach(p => {
    if (p.estado === 'pendiente' || p.gf === null) {
      matchHtml += `<div class="hp-pending">⏳ vs ${COUNTRY_NAMES[p.rival] || p.rival} — 📅 ${p.fecha} | 📍 ${p.ciudad}</div>`;
    } else {
      const resClass = p.res === 'V' ? 'result-v' : p.res === 'E' ? 'result-e' : 'result-d';
      const resLabel = p.res === 'V' ? 'Victoria' : p.res === 'E' ? 'Empate' : 'Derrota';
      matchHtml += `
        <div class="hp-match">
          <span class="${resClass}">[${p.res}]</span>
          <span>vs ${COUNTRY_NAMES[p.rival] || p.rival}</span>
          <span style="color:#fff;font-weight:600">${p.gf}-${p.gc}</span>
        </div>
        <div class="match-detail">📅 ${p.fecha} | 📍 ${p.ciudad} | 🏟️ ${p.estadio}</div>`;
    }
  });
  matches.innerHTML = matchHtml;
  
  panel.style.display = 'block';
  updatePanelPosition(mx, my);
}

function updatePanelPosition(mx, my) {
  const panel = document.getElementById('hover-panel');
  const pw = panel.offsetWidth;
  const ph = panel.offsetHeight;
  let x = mx + 20;
  let y = my - 20;
  if (x + pw > window.innerWidth - 10) x = mx - pw - 20;
  if (y + ph > window.innerHeight - 10) y = window.innerHeight - ph - 10;
  if (y < 10) y = 10;
  panel.style.left = x + 'px';
  panel.style.top = y + 'px';
}

function hidePanel() {
  document.getElementById('hover-panel').style.display = 'none';
}

function onMouseClick(event) {
  // If clicking on a group card, zoom to it
  raycaster.setFromCamera(mouse, camera);
  const cards = Object.values(groupMeshes).map(g => g.cardMesh);
  const intersects = raycaster.intersectObjects(cards);
  if (intersects.length > 0) {
    const groupKey = intersects[0].object.userData.group;
    zoomToGroup(groupKey);
  }
}

// ═══════════════════════════════════════════════════════════
// SECCIÓN 7: UI CONTROLES
// ═══════════════════════════════════════════════════════════

function setupUI() {
  const btnContainer = document.getElementById('group-btns');
  GROUP_LETTERS.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'ctrl-btn';
    btn.textContent = g;
    btn.style.padding = '4px 8px';
    btn.style.textAlign = 'center';
    btn.onclick = () => zoomToGroup(g);
    btnContainer.appendChild(btn);
  });
  
  // ═══ BUSCADOR CON AUTOCOMPLETAR ═══
  const allCountries = [];
  Object.entries(MUNDIAL_2026.grupos).forEach(([gKey, gData]) => {
    gData.equipos.forEach(eq => {
      allCountries.push({
        pais: eq.pais,
        iso2: eq.iso2,
        grupo: gKey,
        paisUpper: eq.pais.toUpperCase()
      });
    });
  });
  
  const searchInput = document.getElementById('search-input');
  const acList = document.getElementById('autocomplete-list');
  let acIndex = -1;
  
  function renderAutocomplete(matches) {
    acList.innerHTML = '';
    acIndex = -1;
    if (matches.length === 0) {
      acList.style.display = 'none';
      return;
    }
    matches.forEach((m, i) => {
      const item = document.createElement('div');
      item.className = 'autocomplete-item';
      item.innerHTML = `
        <img src="https://flagcdn.com/w40/${m.iso2}.png" onerror="this.style.display='none'">
        <span>${m.pais}</span>
        <span class="ac-group">Grupo ${m.grupo}</span>
      `;
      item.onclick = () => selectCountry(m);
      acList.appendChild(item);
    });
    acList.style.display = 'block';
  }
  
  function selectCountry(country) {
    searchInput.value = country.pais;
    acList.style.display = 'none';
    zoomToGroup(country.grupo);
    searchInput.blur();
  }
  
  searchInput.addEventListener('input', () => {
    const val = searchInput.value.trim().toUpperCase();
    if (val.length === 0) {
      acList.style.display = 'none';
      return;
    }
    const matches = allCountries.filter(c => c.paisUpper.includes(val));
    renderAutocomplete(matches);
  });
  
  searchInput.addEventListener('keydown', (e) => {
    const items = acList.querySelectorAll('.autocomplete-item');
    if (items.length === 0) return;
    
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      acIndex = Math.min(acIndex + 1, items.length - 1);
      items.forEach((it, i) => it.classList.toggle('active', i === acIndex));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      acIndex = Math.max(acIndex - 1, 0);
      items.forEach((it, i) => it.classList.toggle('active', i === acIndex));
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (acIndex >= 0 && acIndex < items.length) {
        items[acIndex].click();
      } else if (items.length > 0) {
        items[0].click();
      }
    } else if (e.key === 'Escape') {
      acList.style.display = 'none';
      searchInput.blur();
    }
  });
  
  // Cerrar autocomplete al hacer click fuera
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#search-container')) {
      acList.style.display = 'none';
    }
  });
}

function zoomToGroup(groupKey) {
  const group = groupMeshes[groupKey];
  if (!group) return;
  
  const oc = window._orbitControls;
  const targetPos = group.container.position.clone();
  
  // Animate to group
  const startTarget = oc.target.clone();
  const startTheta = oc.spherical.theta;
  const startPhi = oc.spherical.phi;
  const startRadius = oc.spherical.radius;
  
  const duration = 1500;
  const startTime = Date.now();
  
  function animateCamera() {
    const elapsed = Date.now() - startTime;
    const t = Math.min(1, elapsed / duration);
    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; // ease in-out
    
    oc.target.lerpVectors(startTarget, targetPos, ease);
    oc.spherical.radius = startRadius + (12 - startRadius) * ease;
    oc.updateCamera();
    
    if (t < 1) requestAnimationFrame(animateCamera);
  }
  animateCamera();
}

function resetCamera() {
  const oc = window._orbitControls;
  const startTarget = oc.target.clone();
  const startRadius = oc.spherical.radius;
  const zeroTarget = new THREE.Vector3(0, 0, 0);
  
  const duration = 1200;
  const startTime = Date.now();
  
  function animateCamera() {
    const elapsed = Date.now() - startTime;
    const t = Math.min(1, elapsed / duration);
    const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    
    oc.target.lerpVectors(startTarget, zeroTarget, ease);
    const resetRadius = window.innerWidth <= 768 ? 50 : 30;
    oc.spherical.radius = startRadius + (resetRadius - startRadius) * ease;
    oc.updateCamera();
    
    if (t < 1) requestAnimationFrame(animateCamera);
  }
  animateCamera();
}

function toggleLideres() {
  lideresOnly = !lideresOnly;
  const btn = document.getElementById('btn-lideres');
  btn.classList.toggle('active', lideresOnly);
  
  Object.entries(groupMeshes).forEach(([key, g]) => {
    const opacity = lideresOnly ? 0.3 : 1.0;
    g.flagMeshes.forEach(f => {
      f.material.transparent = true;
      f.material.opacity = opacity;
    });
  });
}

// ═══════════════════════════════════════════════════════════
// SECCIÓN 8: ANIMATION LOOP
// ═══════════════════════════════════════════════════════════

let time = 0;

function animate() {
  requestAnimationFrame(animate);
  
  const delta = clock.getDelta();
  time += delta;
  
  // Rotate stars slowly
  if (starField) {
    starField.rotation.y += delta * 0.01;
    starField.rotation.x += delta * 0.005;
  }
  
  // Animate groups
  Object.entries(groupMeshes).forEach(([key, g]) => {
    // Gentle float for the whole card
    g.container.position.y += Math.sin(time * 0.5 + GROUP_LETTERS.indexOf(key) * 0.7) * 0.001;
    
    // Leader glow pulsing
    if (g.glowMesh) {
      g.glowMesh.material.opacity = 0.1 + Math.sin(time * 2) * 0.08;
    }
    if (g.glowMeshes) {
      g.glowMeshes.forEach((gm, i) => {
        gm.material.opacity = 0.08 + Math.sin(time * 2 + i * 0.5) * 0.06;
      });
    }
    
    // Leader floating animation
    if (g.leaderGroup) {
      g.leaderGroup.position.y = (CARD_H / 2 + 1.0) + Math.sin(time * 1.5 + GROUP_LETTERS.indexOf(key)) * 0.15;
    }
    
    // Leader flag slow rotation
    if (g.leaderMesh) {
      g.leaderMesh.rotation.y = Math.sin(time * 0.3) * 0.2;
    }
    
    // Hover scale animation for flags
    g.flagMeshes.forEach(f => {
      const targetScale = f.userData._hoverScale || 1.0;
      const currentScale = f.scale.x;
      const newScale = currentScale + (targetScale - currentScale) * 0.15;
      f.scale.set(newScale, newScale, newScale);
    });
    
    // LeaderGroup children hover
    if (g.leaderGroup) {
      g.leaderGroup.children.forEach(c => {
        if (c.userData && c.userData.type === 'flag') {
          const targetScale = c.userData._hoverScale || 1.0;
          const currentScale = c.scale.x;
          const newScale = currentScale + (targetScale - currentScale) * 0.15;
          c.scale.set(newScale, newScale, newScale);
        }
      });
    }
    
    // Border glow pulsing
    if (g.borderMesh) {
      g.borderMesh.material.opacity = 0.3 + Math.sin(time + GROUP_LETTERS.indexOf(key)) * 0.15;
    }
  });
  
  renderer.render(scene, camera);
}

  updateLoading(70, loadingMessages[3]);

  GROUP_LETTERS.forEach((gKey, idx) => {

    updateLoading(70 + (idx / GROUP_LETTERS.length) * 25, `Creando Grupo ${gKey}...`);
  });
  
  // Setup UI
  setupUI();

      f.material.transparent = true;
      f.material.opacity = 0.3;
    });
  });
  
  // Start animation
  animate();
}

main();
